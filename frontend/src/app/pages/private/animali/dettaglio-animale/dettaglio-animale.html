<div class="flex h-full w-full overflow-hidden">

    <!-- SIDEBAR -->
    <nav class="sidebar h-full flex flex-column align-items-center py-4 shadow-4">
        
        <div class="flex flex-column gap-1 w-full px-2">
            <a [routerLink]="['anagrafica']" routerLinkActive="nav-item--active" class="nav-item">
                <i class="pi pi-user"></i>
                <span>Anagrafica</span>
            </a>
            <a [routerLink]="['foto']" routerLinkActive="nav-item--active" class="nav-item">
                <i class="pi pi-images"></i>
                <span>Foto/Video</span>
            </a>
            <a [routerLink]="['carattere']" routerLinkActive="nav-item--active" class="nav-item">
                <i class="pi pi-star"></i>
                <span>Carattere</span>
            </a>
            <a [routerLink]="['storia']" routerLinkActive="nav-item--active" class="nav-item">
                <i class="pi pi-clock"></i>
                <span>Storia</span>
            </a>
            <a [routerLink]="['salute']" routerLinkActive="nav-item--active" class="nav-item">
                <i class="pi pi-heart"></i>
                <span>Salute</span>
            </a>
            <a [routerLink]="['adozione']" routerLinkActive="nav-item--active" class="nav-item">
                <i class="pi pi-home"></i>
                <span>Adozione</span>
            </a>
            <a [routerLink]="['cronologia']" routerLinkActive="nav-item--active" class="nav-item">
                <i class="pi pi-list"></i>
                <span>Cronologia</span>
            </a>
        </div>

    </nav>

    <!-- CONTENUTO PRINCIPALE (invariato) -->
    <div class="flex-1 flex flex-column surface-ground overflow-hidden">
        <div class="px-4 py-2 surface-100 border-bottom-1 surface-border">
            <p-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome"
                styleClass="bg-transparent border-none p-0 text-xs md:text-sm"></p-breadcrumb>
        </div>
        <header class="surface-card p-3 shadow-1 flex justify-content-between align-items-center sticky top-0 z-5">
            <div class="flex align-items-center gap-3">
                <p-avatar [image]="animale.foto?.url || 'assets/dog.jpg'" shape="circle" size="large"></p-avatar>
                <h1 class="m-0 text-xl font-bold">{{animale.nome}}</h1>
            </div>
            <div class="flex gap-2">
                <p-button label="<< Indietro" [text]="true" severity="secondary" (click)="annulla()"></p-button>
                <p-confirmDialog></p-confirmDialog>
                <p-toast></p-toast>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-4">
            <router-outlet></router-outlet>
        </div>
    </div>

</div>
