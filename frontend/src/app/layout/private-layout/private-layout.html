<div class="flex flex-column h-screen overflow-hidden">
    
    <div class="bg-gray-900 text-white flex justify-content-between align-items-center px-4 py-3 shadow-2 z-1">
        
        <div class="flex align-items-center gap-5">
            <div class="text-xl font-bold text-white mr-2">Gestionale Asso</div>
            
            <a class="text-white hover:text-primary-300 cursor-pointer font-medium no-underline transition-colors"><i class="pi pi-users mr-2"></i>Contatti</a>
            <a class="text-primary-300 font-bold cursor-pointer no-underline border-bottom-2 border-primary-300 pb-1"><i class="pi pi-heart mr-2"></i>Animali</a>
            <a class="text-white hover:text-primary-300 cursor-pointer font-medium no-underline transition-colors"><i class="pi pi-folder mr-2"></i>Gestione</a>
        </div>

        <div class="flex align-items-center gap-3">
            <span class="text-300">Ciao, {{ username }}</span>
            <p-button icon="pi pi-power-off" 
                      styleClass="p-button-rounded p-button-text p-button-danger text-white hover:bg-red-600" 
                      (onClick)="logout()"
                      pTooltip="Esci">
            </p-button>
        </div>
    </div>

    <div class="surface-200 py-2 px-4 text-sm font-medium text-700 border-bottom-1 surface-border">
        [{{ ruolo }}] {{ username | uppercase }}
    </div>

    <div class="flex-1 overflow-hidden p-0 m-0">
        <router-outlet></router-outlet>
    </div>

</div>
